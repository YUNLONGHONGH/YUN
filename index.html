<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }
    #container { width: 100vw; height: 100vh; }
    #ui-msg { position: fixed; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 10px; z-index: 1000; pointer-events: none; border-radius: 5px; }
  </style>
</head>
<body>
<div id="ui-msg">準備載入 AR...</div>
<div id="container"></div>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  const msg = document.getElementById('ui-msg');
  const FPS = 24;
  const SEGMENT = { s1_end: 20, s2_start: 20, s2_end: 60 };
  const cache = {};
  
  let state = 'model1', activeModel = null, mixer = null;
  const clock = new THREE.Clock();

  // 修正後的載入函式：加上 Cache Busting 避免抓到舊的 404 緩存
  async function loadGLB(fileName) {
    const loader = new GLTFLoader();
    // 加上時間戳記確保抓到的是伺服器最新檔案，而非緩存的 404 頁面
    const url = `${fileName}?v=${Date.now()}`;
    
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`找不到檔案: ${fileName}`);
      const text = await resp.clone().text();
      if (text.trim().startsWith('<!DOCTYPE')) throw new Error(`${fileName} 路徑錯誤，抓到了 HTML 網頁`);

      return new Promise((res, rej) => loader.load(url, res, undefined, rej));
    } catch (e) {
      console.error(e);
      throw e;
    }
  }

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: 'targets.mind',
    uiLoading: 'yes', uiScanning: 'yes', uiError: 'yes',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  function mountModel(gltf) {
    if (activeModel) anchor.group.remove(activeModel);
    activeModel = gltf.scene.clone();
    activeModel.scale.setScalar(0.15);
    activeModel.position.y = 0.05;
    anchor.group.add(activeModel);
    mixer = new THREE.AnimationMixer(activeModel);
    return gltf.animations || [];
  }

  function play(clips, start, end, loop, onEnd) {
    if (!mixer || !clips.length) return onEnd?.();
    mixer.stopAllAction();
    clips.forEach(c => {
      const sub = THREE.AnimationUtils.subclip(c, c.name, start, end, FPS);
      const action = mixer.clipAction(sub);
      action.reset().setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, Infinity).play();
    });
    if (!loop && onEnd) setTimeout(onEnd, ((end - start) / FPS) * 1000);
  }

  document.body.onclick = () => {
    if (state === 'model1') {
      state = 'model2a';
      play(mountModel(cache.model2), 0, SEGMENT.s1_end, true);
      msg.innerText = "播放 Model 2 (循環中)";
    } else if (state === 'model2a') {
      state = 'model2b';
      msg.innerText = "即將進入 Model 3...";
      play(cache.model2.animations, SEGMENT.s2_start, SEGMENT.s2_end, false, () => {
        state = 'model3';
        play(mountModel(cache.model3), 0, 100, true);
        msg.innerText = "播放 Model 3 (循環中)";
      });
    }
  };

  async function init() {
    try {
      msg.innerText = "正在載入模型檔案...";
      const [m1, m2, m3] = await Promise.all([
        loadGLB('model1.glb'),
        loadGLB('model2.glb'),
        loadGLB('model3.glb')
      ]);
      cache.model1 = m1; cache.model2 = m2; cache.model3 = m3;

      msg.innerText = "載入成功，請允許相機權限";
      const clips = mountModel(cache.model1);
      play(clips, 0, 100, false);

      await mindarThree.start();
      msg.innerText = "AR 已啟動，請掃描識別圖";
    } catch (e) {
      msg.style.background = "red";
      msg.innerText = "初始化失敗: " + e.message;
      console.error(e);
    }
  }

  renderer.setAnimationLoop(() => {
    if (mixer) mixer.update(clock.getDelta());
    if (activeModel) activeModel.position.y = 0.05 + Math.sin(Date.now() * 0.002) * 0.01;
    renderer.render(scene, camera);
  });

  init();
</script>
</body>
</html>
