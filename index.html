<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
</head>
<body>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="m1" src="./model1.glb"></a-asset-item>
    <a-asset-item id="m2" src="./model2.glb"></a-asset-item>
    <a-asset-item id="m3" src="./model3.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- model1：預設顯示，循環 -->
    <a-gltf-model id="gltf1"
      src="#m1"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      animation-mixer="clip: *; loop: repeat"
      visible="true"
    ></a-gltf-model>

    <!-- model2：隱藏，點擊後出現 -->
    <a-gltf-model id="gltf2"
      src="#m2"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      animation-mixer="clip: *; loop: once; clampWhenFinished: true"
      visible="false"
    ></a-gltf-model>

    <!-- model3：隱藏，model2 播完後出現循環 -->
    <a-gltf-model id="gltf3"
      src="#m3"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      animation-mixer="clip: *; loop: repeat"
      visible="false"
    ></a-gltf-model>

  </a-entity>
</a-scene>

<script>
// ═══════════════════════════════
//  ★ 設定 ★
// ═══════════════════════════════
var FPS      = 24;
var S1_START = 0;    // model2 第一段 開始格
var S1_END   = 20;   // model2 第一段 結束格（循環）
var S2_START = 20;   // model2 第二段 開始格
var S2_END   = 60;   // model2 第二段 結束格
// ═══════════════════════════════

var state = 'model1';

// A-Frame 載入完後設定事件
document.querySelector('a-scene').addEventListener('loaded', function() {
  var gltf1 = document.getElementById('gltf1');
  var gltf2 = document.getElementById('gltf2');
  var gltf3 = document.getElementById('gltf3');

  // 點擊整個畫面
  document.body.addEventListener('click', function() {

    if (state === 'model1') {
      // 第一次點擊：切到 model2 第一段（循環）
      state = 'model2a';
      gltf1.setAttribute('visible', false);
      gltf2.setAttribute('visible', true);
      gltf2.setAttribute('animation-mixer', {
        clip: '*',
        loop: 'repeat',
        startAt: S1_START / FPS,
        // A-Frame animation-mixer 用 timeScale 控制
      });
      // 用原生 Three.js mixer 控制播放區段
      gltf2.addEventListener('model-loaded', function() {
        playSegment(gltf2, S1_START, S1_END, true, null);
      });
      // 如果已經載入過，直接播
      if (gltf2.components['gltf-model'] && gltf2.components['gltf-model'].model) {
        playSegment(gltf2, S1_START, S1_END, true, null);
      }

    } else if (state === 'model2a') {
      // 第二次點擊：model2 第二段（播完進 model3）
      state = 'model2b';
      playSegment(gltf2, S2_START, S2_END, false, function() {
        // 播完自動切 model3
        state = 'model3';
        gltf2.setAttribute('visible', false);
        gltf3.setAttribute('visible', true);
        playSegment(gltf3, 0, 999, true, null);
      });
    }
  });
});

// 用 Three.js mixer 控制 A-Frame gltf 的播放區段
function playSegment(el, startFrame, endFrame, loop, onEnd) {
  var mesh = el.getObject3D('mesh');
  if (!mesh) return;

  // 找 AnimationMixer
  var mixer = el.components['animation-mixer'] &&
              el.components['animation-mixer'].mixer;
  if (!mixer) return;

  var clips = mesh.animations || (el.components['gltf-model'].model && el.components['gltf-model'].model.animations) || [];
  if (!clips || clips.length === 0) return;

  mixer.stopAllAction();

  var startSec = startFrame / FPS;
  var endSec   = endFrame   / FPS;

  clips.forEach(function(clip) {
    var sub = THREE.AnimationUtils.subclip(
      clip, clip.name,
      startFrame,
      endFrame === 999 ? Math.round(clip.duration * FPS) : endFrame,
      FPS
    );
    var action = mixer.clipAction(sub);
    action.reset();
    action.time = 0;
    if (loop) {
      action.setLoop(THREE.LoopRepeat, Infinity);
    } else {
      action.setLoop(THREE.LoopOnce, 1);
      action.clampWhenFinished = true;
    }
    action.play();
  });

  if (!loop && onEnd) {
    var ms = (endSec - startSec) * 1000;
    setTimeout(onEnd, ms);
  }
}
</script>

</body>
</html>
