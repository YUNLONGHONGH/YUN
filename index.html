<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="container"></div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  async function startAR() {
    const mindarThree = new MindARThree({
      container: document.getElementById('container'),
      imageTargetSrc: 'targets.mind', // 移除 ./ 以符合 GitHub Pages 路徑
      uiLoading: 'yes', uiScanning: 'yes', uiError: 'yes',
    });

    const { renderer, scene, camera } = mindarThree;
    const anchor = mindarThree.addAnchor(0);
    scene.add(new THREE.AmbientLight(0xffffff, 1));

    const loader = new GLTFLoader();
    
    // 關鍵：使用你 GitHub 上確實存在的檔名
    loader.load('model1.glb', (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(0.15);
      model.position.y = 0.05;
      anchor.group.add(model);

      const mixer = new THREE.AnimationMixer(model);
      if (gltf.animations.length > 0) {
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      }

      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        const delta = clock.getDelta();
        mixer.update(delta);
        model.rotation.y += 0.01;
        renderer.render(scene, camera);
      });
    }, undefined, (error) => {
      console.error("模型載入失敗:", error);
      alert("載入失敗，請確認檔案 'model1.glb' 是否與此網頁在同一個資料夾。");
    });

    try {
      await mindarThree.start();
    } catch (err) {
      console.error("相機啟動失敗:", err);
      if (err.name === 'NotAllowedError') alert("請允許相機權限");
    }
  }

  startAR();
</script>
</body>
</html>
