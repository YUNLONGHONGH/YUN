<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <title>AR Birthday Card</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* 確保像素粒子層是透明的，且不會阻擋點擊 */
    #pixel-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 10; /* 放在 AR 畫面上方 */
      image-rendering: pixelated;
    }

    /* 隱藏 MindAR 預設的 UI，讓畫面乾淨 */
    .mindar-ui-overlay { display: none !important; }
  </style>
</head>
<body>

  <canvas id="pixel-canvas"></canvas>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true; antialias: true;"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      
      <a-light type="ambient" intensity="0.8"></a-light>
      <a-light type="point" color="#FFE066" intensity="2" position="0 1 1"></a-light>

      <a-gltf-model
        src="#model"
        scale="0.2 0.2 0.2"
        position="0 0 0"
        animation-mixer
        animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
        animation__float="property: position; from: 0 0 0; to: 0 0.1 0; loop: true; dur: 2000; easing: easeInOutSine; dir: alternate"
      ></a-gltf-model>

      <a-torus radius="0.25" radius-tubular="0.005" color="#FFE066" rotation="90 0 0"
        material="shader: flat; opacity: 0.8"
        animation="property: rotation; to: 90 360 0; loop: true; dur: 4000; easing: linear">
      </a-torus>

      <a-torus radius="0.32" radius-tubular="0.005" color="#00FFFF" rotation="90 0 0"
        material="shader: flat; opacity: 0.6"
        animation="property: rotation; to: 90 -360 0; loop: true; dur: 6000; easing: linear">
      </a-torus>

      <a-box size="0.03" color="#FF00FF" position="0.3 0.1 0"
        animation="property: position; to: 0.3 0.2 0; loop: true; dur: 1500; dir: alternate; easing: easeInOutSine">
      </a-box>
    </a-entity>
  </a-scene>

  <script>
    // --- 像素粒子邏輯 (修正全黑問題版) ---
    const canvas = document.getElementById('pixel-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = Math.floor(window.innerWidth / 3);
      canvas.height = Math.floor(window.innerHeight / 3);
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = ['#FFE066','#FF8C00','#FF00FF','#00FFFF','#00FF41','#FF2020','#FFFFFF'];

    class Pixel {
      constructor() { this.reset(true); }
      reset(init = false) {
        this.x = Math.random() * canvas.width;
        this.y = init ? Math.random() * canvas.height : canvas.height + 2;
        this.size = 1 + Math.floor(Math.random() * 2);
        this.vy = -(0.2 + Math.random() * 0.5);
        this.life = init ? Math.random() : 1;
        this.decay = 0.005 + Math.random() * 0.01;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      }
      update() {
        this.y += this.vy;
        this.life -= this.decay;
        if (this.life <= 0) this.reset();
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.life;
        ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
      }
    }

    const pixels = [];
    for (let i = 0; i < 60; i++) pixels.push(new Pixel());

    function loop() {
      // 重要：使用 clearRect 而不是 fillRect(黑色)，確保背景透明
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      pixels.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
