<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

    /* 讓 A-Frame canvas 和 video 完整顯示 */
    a-scene { width: 100vw !important; height: 100vh !important; }
    .a-canvas { width: 100vw !important; height: 100vh !important; }

    /* 相機 video 背景 */
    video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    /* 像素粒子層 */
    #pixel-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 999;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>

<canvas id="pixel-canvas"></canvas>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true;"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="./model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-light type="point" color="#FFE066" intensity="3" position="0 0.5 0.3"></a-light>
    <a-light type="point" color="#00FFFF" intensity="2" position="0 -0.2 0.3"></a-light>
    <a-light type="point" color="#FF00FF" intensity="1.5" position="-0.5 0.3 0.3"></a-light>

    <a-gltf-model
      src="#model"
      scale="0.5 0.5 0.5"
      position="0 0.05 0"
      rotation="0 0 0"
      animation-mixer="clip: *; loop: repeat"
      animation__spin="property: rotation; from: 0 -15 0; to: 0 15 0; loop: true; dur: 1800; easing: easeInOutSine; dir: alternate"
      animation__float="property: position; from: 0 0.02 0; to: 0 0.10 0; loop: true; dur: 1400; easing: easeInOutSine; dir: alternate"
    ></a-gltf-model>

    <a-torus position="0 0.01 0" rotation="90 0 0"
      radius="0.22" radius-tubular="0.008" segments-tubular="12"
      color="#FFE066" material="emissive: #FFE066; emissiveIntensity: 1.5; shader: flat"
      animation__r1="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 3000; easing: linear">
    </a-torus>

    <a-torus position="0 0.01 0" rotation="90 0 0"
      radius="0.15" radius-tubular="0.006" segments-tubular="12"
      color="#00FFFF" material="emissive: #00FFFF; emissiveIntensity: 1.5; shader: flat"
      animation__r2="property: rotation; from: 90 0 0; to: 90 -360 0; loop: true; dur: 2000; easing: linear">
    </a-torus>

    <a-torus position="0 0.01 0" rotation="90 0 0"
      radius="0.30" radius-tubular="0.004" segments-tubular="12"
      color="#FF00FF" material="emissive: #FF00FF; emissiveIntensity: 1.2; shader: flat"
      animation__r3="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 4500; easing: linear">
    </a-torus>

    <a-box position="0.22 0.08 0" scale="0.025 0.025 0.025"
      color="#FFE066" material="emissive: #FFE066; emissiveIntensity: 2; shader: flat"
      animation__bob="property: position; from: 0.22 0.04 0; to: 0.22 0.12 0; loop: true; dur: 1100; easing: easeInOutSine; dir: alternate">
    </a-box>

    <a-box position="-0.16 0.06 0" scale="0.020 0.020 0.020"
      color="#00FFFF" material="emissive: #00FFFF; emissiveIntensity: 2; shader: flat"
      animation__bob="property: position; from: -0.16 0.02 0; to: -0.16 0.10 0; loop: true; dur: 900; easing: easeInOutSine; dir: alternate">
    </a-box>

    <a-box position="0 0.12 0.20" scale="0.018 0.018 0.018"
      color="#00FF41" material="emissive: #00FF41; emissiveIntensity: 2; shader: flat"
      animation__bob="property: position; from: 0 0.06 0.20; to: 0 0.16 0.20; loop: true; dur: 1300; easing: easeInOutSine; dir: alternate">
    </a-box>

    <a-box position="0.10 0.05 -0.18" scale="0.016 0.016 0.016"
      color="#FF2020" material="emissive: #FF2020; emissiveIntensity: 2; shader: flat"
      animation__bob="property: position; from: 0.10 0.01 -0.18; to: 0.10 0.10 -0.18; loop: true; dur: 800; easing: easeInOutSine; dir: alternate">
    </a-box>

  </a-entity>
</a-scene>

<script>
// 像素粒子
const canvas = document.getElementById('pixel-canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = Math.floor(window.innerWidth  / 3);
  canvas.height = Math.floor(window.innerHeight / 3);
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#FFE066','#FF8C00','#FF00FF','#00FFFF','#00FF41','#FF2020','#FFFFFF','#BF00FF'];

class Pixel {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x     = Math.random() * canvas.width;
    this.y     = init ? Math.random() * canvas.height : canvas.height + 2;
    this.size  = 1 + Math.floor(Math.random() * 3);
    this.vy    = -(0.3 + Math.random() * 0.8);
    this.vx    = (Math.random() - 0.5) * 0.4;
    this.life  = init ? Math.random() : 1;
    this.decay = 0.006 + Math.random() * 0.010;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.blinkSpeed = 3 + Math.random() * 6;
    this.blinkT     = Math.random() * Math.PI * 2;
    this.doBlink    = Math.random() > 0.4;
  }
  update(dt) {
    this.x     += this.vx;
    this.y     += this.vy;
    this.life  -= this.decay;
    this.blinkT += this.blinkSpeed * dt;
    if (this.life <= 0) this.reset();
  }
  draw() {
    if (this.doBlink && Math.sin(this.blinkT) < 0) return;
    ctx.globalAlpha = Math.max(0, this.life) * 0.85;
    ctx.fillStyle   = this.color;
    ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
  }
}

const pixels = [];
for (let i = 0; i < 100; i++) pixels.push(new Pixel());

let lastTime = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  ctx.globalAlpha = 0.2;
  ctx.fillStyle   = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  pixels.forEach(p => { p.update(dt); p.draw(); });
}
requestAnimationFrame(loop);
</script>

</body>
</html>
