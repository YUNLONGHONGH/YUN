<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.134.0/examples/jsm/renderers/CSS3DRenderer.js",
      "three/addons/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }

    /* 像素粒子層：浮在最上面，不擋相機操作 */
    #pixel-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;   /* 不擋觸控 */
      z-index: 9999;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>

<!-- AR 容器（原本不動） -->
<div id="container"></div>

<!-- 像素粒子層（加在最上面） -->
<canvas id="pixel-canvas"></canvas>

<!-- AR 程式碼（原本的，完全不動） -->
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind',
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const light = new THREE.PointLight(0xffaa00, 3, 6);
  light.position.set(1, 2, 1);
  scene.add(light);

  const loader = new GLTFLoader();
  loader.load('./model.glb', function(gltf) {
    const model = gltf.scene;
    model.scale.set(0.15, 0.15, 0.15);
    model.position.y = 0.05;
    anchor.group.add(model);

    const mixer = new THREE.AnimationMixer(model);
    if (gltf.animations.length > 0) {
      gltf.animations.forEach(function(clip) {
        mixer.clipAction(clip).play();
      });
    }

    const clock = new THREE.Clock();
    let t = 0;
    renderer.setAnimationLoop(function() {
      const delta = clock.getDelta();
      t += delta;
      mixer.update(delta);
      model.rotation.y += 0.02;
      model.position.y = 0.05 + Math.sin(t * 1.5) * 0.03;
      renderer.render(scene, camera);
    });
  });

  mindarThree.start();
</script>

<!-- 像素粒子特效（獨立的，跟 AR 完全分開） -->
<script>
  const pc  = document.getElementById('pixel-canvas');
  const ctx = pc.getContext('2d');

  function resize() {
    // 低解析度 → 像素方塊感
    pc.width  = Math.floor(window.innerWidth  / 3);
    pc.height = Math.floor(window.innerHeight / 3);
    pc.style.width  = window.innerWidth  + 'px';
    pc.style.height = window.innerHeight + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = [
    '#FFE066', '#FF8C00', '#FF00FF',
    '#00FFFF', '#00FF41', '#FF2020',
    '#FFFFFF', '#BF00FF'
  ];

  class Pixel {
    constructor() { this.reset(true); }
    reset(init = false) {
      this.x     = Math.random() * pc.width;
      this.y     = init ? Math.random() * pc.height : pc.height + 2;
      this.size  = 1 + Math.floor(Math.random() * 3);
      this.vy    = -(0.3 + Math.random() * 0.8);
      this.vx    = (Math.random() - 0.5) * 0.4;
      this.life  = init ? Math.random() : 1;
      this.decay = 0.005 + Math.random() * 0.008;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.blinkSpeed = 3 + Math.random() * 6;
      this.blinkT     = Math.random() * Math.PI * 2;
      this.doBlink    = Math.random() > 0.4;
    }
    update(dt) {
      this.x     += this.vx;
      this.y     += this.vy;
      this.life  -= this.decay;
      this.blinkT += this.blinkSpeed * dt;
      if (this.life <= 0) this.reset();
    }
    draw() {
      if (this.doBlink && Math.sin(this.blinkT) < 0) return;
      ctx.globalAlpha = Math.max(0, this.life) * 0.85;
      ctx.fillStyle   = this.color;
      ctx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
    }
  }

  const pixels = [];
  for (let i = 0; i < 100; i++) pixels.push(new Pixel());

  let lastTime = 0;
  function loop(ts) {
    requestAnimationFrame(loop);
    const dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;
    // 半透明黑色殘影 = 像素拖尾
    ctx.globalAlpha = 0.2;
    ctx.fillStyle   = '#000000';
    ctx.fillRect(0, 0, pc.width, pc.height);
    pixels.forEach(p => { p.update(dt); p.draw(); });
  }
  requestAnimationFrame(loop);
</script>

</body>
</html>
