<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <!-- 用 jsdelivr，這是你第一次成功用的來源 -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="container"></div>
<script>
window.addEventListener('load', function() {

  // ═══════════════════════════════
  //  ★ 改格數只需要動這裡 ★
  // ═══════════════════════════════
  var FPS = 24;
  var S1_START =  0 / FPS;   // model2 第一段 開始格
  var S1_END   = 20 / FPS;   // model2 第一段 結束格（循環）
  var S2_START = 20 / FPS;   // model2 第二段 開始格
  var S2_END   = 60 / FPS;   // model2 第二段 結束格（播完進 model3）
  var MODEL_SCALE = 0.15;    // 模型大小
  var MODEL_Y     = 0.05;    // 模型高度
  // ═══════════════════════════════

  var mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind',
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  var renderer = mindarThree.renderer;
  var scene    = mindarThree.scene;
  var camera   = mindarThree.camera;
  var anchor   = mindarThree.addAnchor(0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  var light = new THREE.PointLight(0xffaa00, 3, 6);
  light.position.set(1, 2, 1);
  scene.add(light);

  var state       = 'loading';
  var activeModel = null;
  var mixer       = null;
  var activeActions = [];
  var clock       = new THREE.Clock();
  var t           = 0;
  var cache       = {};

  // 載入 GLB
  function loadGLB(path, done) {
    var loader = new THREE.GLTFLoader();
    loader.load(path, done, null, function(e) {
      console.error('載入失敗: ' + path, e);
    });
  }

  // 把模型放到場景
  function mountModel(gltf) {
    if (activeModel) anchor.group.remove(activeModel);
    activeActions = [];
    var model = gltf.scene.clone(true);
    model.scale.setScalar(MODEL_SCALE);
    model.position.y = MODEL_Y;
    anchor.group.add(model);
    activeModel = model;
    mixer = new THREE.AnimationMixer(model);
    return gltf.animations || [];
  }

  // 播放指定秒數區段
  function playSegment(clips, startSec, endSec, loop, onEnd) {
    if (!mixer || clips.length === 0) {
      if (onEnd) setTimeout(onEnd, 100);
      return;
    }
    mixer.stopAllAction();
    activeActions = [];

    clips.forEach(function(clip) {
      var subClip = THREE.AnimationUtils.subclip(
        clip, clip.name,
        Math.round(startSec * FPS),
        Math.round(endSec   * FPS),
        FPS
      );
      var action = mixer.clipAction(subClip);
      action.reset();
      action.time = 0;
      if (loop) {
        action.setLoop(THREE.LoopRepeat, Infinity);
      } else {
        action.setLoop(THREE.LoopOnce, 1);
        action.clampWhenFinished = true;
      }
      action.play();
      activeActions.push(action);
    });

    if (!loop && onEnd) {
      var ms = (endSec - startSec) * 1000;
      setTimeout(onEnd, ms);
    }
  }

  // model1：播一次停在最後一格
  function showModel1() {
    state = 'model1';
    var clips = mountModel(cache.model1);
    var total = clips[0] ? clips[0].duration : 1;
    playSegment(clips, 0, total, false, null);
  }

  // model2 第一段（0~20格）：循環
  function showModel2a() {
    state = 'model2a';
    var clips = mountModel(cache.model2);
    playSegment(clips, S1_START, S1_END, true, null);
  }

  // model2 第二段（20~60格）：播完自動進 model3
  function showModel2b() {
    state = 'model2b';
    var clips = cache.model2.animations || [];
    playSegment(clips, S2_START, S2_END, false, function() {
      showModel3();
    });
  }

  // model3：循環
  function showModel3() {
    state = 'model3';
    var clips = mountModel(cache.model3);
    var total = clips[0] ? clips[0].duration : 1;
    playSegment(clips, 0, total, true, null);
  }

  // 點擊事件
  document.getElementById('container').addEventListener('click', function() {
    if      (state === 'model1')  showModel2a();
    else if (state === 'model2a') showModel2b();
  });

  // 動畫迴圈
  renderer.setAnimationLoop(function() {
    var delta = clock.getDelta();
    t += delta;
    if (mixer) mixer.update(delta);
    if (activeModel) {
      activeModel.position.y = MODEL_Y + Math.sin(t * 1.5) * 0.02;
    }
    renderer.render(scene, camera);
  });

  // 載入三個模型後啟動
  var loaded = 0;
  function onLoaded(key, gltf) {
    cache[key] = gltf;
    loaded++;
    if (loaded === 3) {
      showModel1();
      mindarThree.start();
    }
  }

  loadGLB('./model1.glb', function(g) { onLoaded('model1', g); });
  loadGLB('./model2.glb', function(g) { onLoaded('model2', g); });
  loadGLB('./model3.glb', function(g) { onLoaded('model3', g); });

});
</script>
</body>
</html>
