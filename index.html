<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/addons/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.134.0/examples/jsm/renderers/CSS3DRenderer.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="container"></div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  // ═══════════════════════════════
  //  ★ 參數設定區 ★
  // ═══════════════════════════════
  const FPS = 24;
  const SEGMENT = {
    s1_start: 0,   // 第 0 格
    s1_end:   20,  // 第 20 格
    s2_start: 20,
    s2_end:   60,
  };

  const MODEL_SCALE = 0.15;
  const MODEL_Y     = 0.05;
  // ═══════════════════════════════

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind', // 請確認此檔案存在
    uiLoading: 'no', uiScanning: 'no', uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const light = new THREE.PointLight(0xffaa00, 3, 6);
  light.position.set(1, 2, 1);
  scene.add(light);

  let state         = 'model1';
  let activeModel   = null;
  let mixer         = null;
  const clock       = new THREE.Clock();
  let t             = 0;
  const cache       = {};

  // 載入器加入錯誤捕捉
  function loadGLB(path) {
    return new Promise((res, rej) => {
      new GLTFLoader().load(
        path, 
        (gltf) => res(gltf),
        undefined,
        (err) => {
          console.error(`無法載入模型: ${path}`, err);
          rej(err);
        }
      );
    });
  }

  function mountModel(gltf) {
    if (activeModel) anchor.group.remove(activeModel);
    
    // 使用 clone 確保原始資料不被破壞
    const model = gltf.scene.clone();
    model.scale.setScalar(MODEL_SCALE);
    model.position.y = MODEL_Y;
    anchor.group.add(model);
    
    activeModel = model;
    mixer = new THREE.AnimationMixer(model);
    return { clips: gltf.animations || [] };
  }

  function playSegment(clips, startFrame, endFrame, loop, onEnd) {
    if (!mixer || clips.length === 0) {
      if (onEnd) setTimeout(onEnd, 100);
      return;
    }
    mixer.stopAllAction();

    clips.forEach(clip => {
      // subclip 參數：(原始片段, 名字, 開始格, 結束格, FPS)
      const subClip = THREE.AnimationUtils.subclip(
        clip, clip.name, startFrame, endFrame, FPS
      );
      const action = mixer.clipAction(subClip);
      action.reset();
      action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, Infinity);
      action.clampWhenFinished = !loop; 
      action.play();
    });

    if (!loop && onEnd) {
      const duration = ((endFrame - startFrame) / FPS) * 1000;
      setTimeout(onEnd, duration);
    }
  }

  function showModel1() {
    state = 'model1';
    const { clips } = mountModel(cache.model1);
    if (clips.length > 0) {
      const totalFrames = Math.floor(clips[0].duration * FPS);
      playSegment(clips, 0, totalFrames, false, null);
    }
  }

  function showModel2a() {
    state = 'model2a';
    const { clips } = mountModel(cache.model2);
    playSegment(clips, SEGMENT.s1_start, SEGMENT.s1_end, true, null);
  }

  function showModel2b() {
    state = 'model2b';
    const clips = cache.model2.animations || [];
    playSegment(clips, SEGMENT.s2_start, SEGMENT.s2_end, false, () => {
      showModel3();
    });
  }

  function showModel3() {
    state = 'model3';
    const { clips } = mountModel(cache.model3);
    if (clips.length > 0) {
      const totalFrames = Math.floor(clips[0].duration * FPS);
      playSegment(clips, 0, totalFrames, true, null);
    }
  }

  document.getElementById('container').addEventListener('click', () => {
    if      (state === 'model1')  showModel2a();
    else if (state === 'model2a') showModel2b();
  });

  renderer.setAnimationLoop(() => {
    const delta = clock.getDelta();
    t += delta;
    if (mixer) mixer.update(delta);
    if (activeModel) activeModel.position.y = MODEL_Y + Math.sin(t * 1.5) * 0.02;
    renderer.render(scene, camera);
  });

  async function init() {
    try {
      // 確保路徑與檔案名稱完全正確
      const [g1, g2, g3] = await Promise.all([
        loadGLB('./model1.glb'),
        loadGLB('./model2.glb'),
        loadGLB('./model3.glb'),
      ]);
      cache.model1 = g1;
      cache.model2 = g2;
      cache.model3 = g3;
      
      showModel1();
      await mindarThree.start();
    } catch(e) {
      alert('初始化失敗，請檢查網路連接或檔案路徑。');
    }
  }

  init();
</script>
</body>
</html>
