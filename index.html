<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="UTF-8" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
</head>
<body>

<script>
// ═══════════════════════════
//  ★ 設定區 ★
// ═══════════════════════════
var FPS      = 24;
var S1_START = 0;    // model2 第一段開始格
var S1_END   = 20;   // model2 第一段結束格（循環）
var S2_START = 20;   // model2 第二段開始格
var S2_END   = 60;   // model2 第二段結束格（播完進model3）
// ═══════════════════════════

var mixers = { m1: null, m2: null, m3: null };

// A-Frame tick component（每幀更新所有 mixer）
AFRAME.registerComponent('mixer-tick', {
  tick: function(time, delta) {
    var d = delta / 1000;
    if (mixers.m1) mixers.m1.mixer.update(d);
    if (mixers.m2) mixers.m2.mixer.update(d);
    if (mixers.m3) mixers.m3.mixer.update(d);
  }
});
</script>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  mixer-tick
>
  <a-assets>
    <a-asset-item id="m1" src="./model1.glb"></a-asset-item>
    <a-asset-item id="m2" src="./model2.glb"></a-asset-item>
    <a-asset-item id="m3" src="./model3.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model id="gltf1"
      src="#m1"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      visible="true"
    ></a-gltf-model>

    <a-gltf-model id="gltf2"
      src="#m2"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      visible="false"
    ></a-gltf-model>

    <a-gltf-model id="gltf3"
      src="#m3"
      position="0 0.05 0"
      scale="0.15 0.15 0.15"
      visible="false"
    ></a-gltf-model>

  </a-entity>
</a-scene>

<script>
var state = 'model1';
var scene = document.querySelector('a-scene');

function buildMixer(el, key, onReady) {
  var check = setInterval(function() {
    var comp = el.components['gltf-model'];
    if (comp && comp.model) {
      clearInterval(check);
      var root = comp.model.scene || comp.model;
      var mixer = new THREE.AnimationMixer(root);
      var clips = comp.model.animations || [];
      mixers[key] = { mixer: mixer, clips: clips };
      console.log(key + ' ready, clips: ' + clips.length);
      if (onReady) onReady();
    }
  }, 100);
}

function playClips(key, startF, endF, loop, onEnd) {
  var data = mixers[key];
  if (!data || data.clips.length === 0) {
    console.warn(key + ' no clips yet');
    if (onEnd) setTimeout(onEnd, 500);
    return;
  }
  var mixer = data.mixer;
  var clips = data.clips;
  mixer.stopAllAction();

  var realEnd = (endF === 999)
    ? Math.round(clips[0].duration * FPS)
    : endF;

  clips.forEach(function(clip) {
    var sub = THREE.AnimationUtils.subclip(clip, clip.name, startF, realEnd, FPS);
    var action = mixer.clipAction(sub);
    action.reset();
    action.time = 0;
    action.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
    action.clampWhenFinished = !loop;
    action.play();
  });

  if (!loop && onEnd) {
    setTimeout(onEnd, ((realEnd - startF) / FPS) * 1000);
  }
}

scene.addEventListener('loaded', function() {
  var gltf1 = document.getElementById('gltf1');
  var gltf2 = document.getElementById('gltf2');
  var gltf3 = document.getElementById('gltf3');

  buildMixer(gltf1, 'm1', function() { playClips('m1', 0, 999, true, null); });
  buildMixer(gltf2, 'm2', null);
  buildMixer(gltf3, 'm3', null);

  document.body.addEventListener('click', function() {
    if (state === 'model1') {
      state = 'model2a';
      gltf1.setAttribute('visible', false);
      gltf2.setAttribute('visible', true);
      var try2 = function() {
        if (mixers.m2) playClips('m2', S1_START, S1_END, true, null);
        else setTimeout(try2, 100);
      };
      try2();

    } else if (state === 'model2a') {
      state = 'model2b';
      playClips('m2', S2_START, S2_END, false, function() {
        state = 'model3';
        gltf2.setAttribute('visible', false);
        gltf3.setAttribute('visible', true);
        var try3 = function() {
          if (mixers.m3) playClips('m3', 0, 999, true, null);
          else setTimeout(try3, 100);
        };
        try3();
      });
    }
  });
});
</script>

</body>
</html>
