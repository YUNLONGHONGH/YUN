<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/addons/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.134.0/examples/jsm/renderers/CSS3DRenderer.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<div id="container"></div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  // ═══════════════════════════════
  //  ★ 改格數只需要動這裡 ★
  // ═══════════════════════════════
  const FPS = 24;

  const SEGMENT = {
    s1_start:  0 / FPS,   // model2 第一段 開始格
    s1_end:   20 / FPS,   // model2 第一段 結束格（循環）
    s2_start: 20 / FPS,   // model2 第二段 開始格
    s2_end:   60 / FPS,   // model2 第二段 結束格（播完進 model3）
  };

  const MODEL_SCALE = 0.15;
  const MODEL_Y     = 0.05;
  // ═══════════════════════════════

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind',
    uiLoading: 'no', uiScanning: 'no', uiError: 'no',
  });
  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const light = new THREE.PointLight(0xffaa00, 3, 6);
  light.position.set(1, 2, 1);
  scene.add(light);

  let state         = 'model1';
  let activeModel   = null;
  let mixer         = null;
  let activeActions = [];
  const clock       = new THREE.Clock();
  let t             = 0;
  const cache       = {};

  function loadGLB(path) {
    return new Promise((res, rej) => new GLTFLoader().load(path, res, null, rej));
  }

  function mountModel(gltf) {
    if (activeModel) anchor.group.remove(activeModel);
    activeActions = [];
    const model = gltf.scene.clone(true);
    model.scale.setScalar(MODEL_SCALE);
    model.position.y = MODEL_Y;
    anchor.group.add(model);
    activeModel = model;
    mixer = new THREE.AnimationMixer(model);
    return { clips: gltf.animations || [] };
  }

  function playSegment(clips, startSec, endSec, loop, onEnd) {
    if (!mixer || clips.length === 0) {
      if (onEnd) setTimeout(onEnd, 100);
      return;
    }
    mixer.stopAllAction();
    activeActions = [];

    clips.forEach(clip => {
      const subClip = THREE.AnimationUtils.subclip(
        clip, clip.name, startSec * FPS, endSec * FPS, FPS
      );
      const action = mixer.clipAction(subClip);
      action.reset();
      action.time = 0;
      if (loop) {
        action.setLoop(THREE.LoopRepeat, Infinity);  // 循環
      } else {
        action.setLoop(THREE.LoopOnce, 1);
        action.clampWhenFinished = true;             // 停在最後一格
      }
      action.play();
      activeActions.push(action);
    });

    // 非循環 → 播完觸發 onEnd
    if (!loop && onEnd) {
      const duration = (endSec - startSec) * 1000;  // 毫秒
      setTimeout(onEnd, duration);
    }
  }

  // model1：播一次停在最後一格
  function showModel1() {
    state = 'model1';
    const { clips } = mountModel(cache.model1);
    const total = clips[0] ? clips[0].duration : 1;
    playSegment(clips, 0, total, false, null);
  }

  // model2 第一段（0~20格）：循環播放
  function showModel2a() {
    state = 'model2a';
    const { clips } = mountModel(cache.model2);
    playSegment(clips, SEGMENT.s1_start, SEGMENT.s1_end, true, null); // ← loop: true
  }

  // model2 第二段（20~60格）：播一次，播完自動進 model3
  function showModel2b() {
    state = 'model2b';
    const clips = cache.model2.animations || [];
    // 不重新 mount，直接繼續同一個模型換段播放
    playSegment(clips, SEGMENT.s2_start, SEGMENT.s2_end, false, () => {
      showModel3();
    });
  }

  // model3：循環播放
  function showModel3() {
    state = 'model3';
    const { clips } = mountModel(cache.model3);
    const total = clips[0] ? clips[0].duration : 1;
    playSegment(clips, 0, total, true, null);
  }

  // 點擊邏輯
  document.getElementById('container').addEventListener('click', () => {
    if      (state === 'model1')  showModel2a();  // 第一次點擊
    else if (state === 'model2a') showModel2b();  // 第二次點擊
    // model2b / model3 不回應點擊
  });

  // 動畫迴圈
  renderer.setAnimationLoop(() => {
    const delta = clock.getDelta();
    t += delta;
    if (mixer) mixer.update(delta);
    if (activeModel) activeModel.position.y = MODEL_Y + Math.sin(t * 1.5) * 0.02;
    renderer.render(scene, camera);
  });

  // 啟動
  async function init() {
    try {
      const [g1, g2, g3] = await Promise.all([
        loadGLB('./model1.glb'),
        loadGLB('./model2.glb'),
        loadGLB('./model3.glb'),
      ]);
      cache.model1 = g1;
      cache.model2 = g2;
      cache.model3 = g3;
      showModel1();
      await mindarThree.start();
    } catch(e) {
      console.error('載入失敗', e);
    }
  }

  init();
</script>
</body>
</html>
