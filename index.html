<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    #container { width: 100vw; height: 100vh; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.134.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.134.0/examples/jsm/loaders/GLTFLoader.js",
      "three/addons/renderers/CSS3DRenderer.js": "https://unpkg.com/three@0.134.0/examples/jsm/renderers/CSS3DRenderer.js",
      "three/addons/": "https://unpkg.com/three@0.134.0/examples/jsm/",
      "three/examples/jsm/": "https://unpkg.com/three@0.134.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="container"></div>
<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
  import { MindARThree } from 'https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js';

  const mindarThree = new MindARThree({
    container: document.getElementById('container'),
    imageTargetSrc: './targets.mind',
    uiLoading: 'no',
    uiScanning: 'no',
    uiError: 'no',
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));
  const light = new THREE.PointLight(0xffaa00, 3, 6);
  light.position.set(1, 2, 1);
  scene.add(light);

  const loader = new GLTFLoader();
  loader.load('./model.glb', function(gltf) {
    const model = gltf.scene;
    model.scale.set(0.15, 0.15, 0.15);
    model.position.y = 0.05;
    anchor.group.add(model);

    const mixer = new THREE.AnimationMixer(model);
    if (gltf.animations.length > 0) {
      gltf.animations.forEach(function(clip) {
        mixer.clipAction(clip).play();
      });
    }

    const clock = new THREE.Clock();
    let t = 0;
    renderer.setAnimationLoop(function() {
      const delta = clock.getDelta();
      t += delta;
      mixer.update(delta);
      model.rotation.y += 0.02;
      model.position.y = 0.05 + Math.sin(t * 1.5) * 0.03;
      renderer.render(scene, camera);
    });
  });

  mindarThree.start();
</script>
</body>
</html>
